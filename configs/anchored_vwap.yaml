# Anchored VWAP + Market Structure Break (Nvidia AVWAP playbook port)
name: anchored_vwap
strategy: anchored_vwap
symbols: [ADAUSDT]            # unique coin -> no position clash on shared account
timeframe: 15m          # 15m sweet spot (backtest)
market: futures

leverage: 10
risk_per_trade_pct: 1.0
risk_usdt: 2
max_position_usdt: 100
use_break_even: true
tp_split: [0.34, 0.33, 0.33]

lookback_bars: 600
poll_seconds: 5
dry_run: false

params:
  major_pivot: 20           # "major" swing H/L that anchors the AVWAPs
  minor_pivot: 3            # minor pivots that define the MSB leg
  retest_window: 12         # bars the AVWAP retest may sit within
  retest_tol_atr: 0.25      # how close (×ATR) a wick must come to count as a retest
  max_anchor_age: 300       # ignore anchors older than this many bars
  min_avwap_sep_atr: 0.5    # skip when support/resistance AVWAPs are bunched
  extend_lookback: 3        # no entry if a fresh HOD/LOD printed this recently
  sl_mode: conservative     # conservative (retest H/L) | aggressive (minor H/L)
  atr_len: 14
  tp1: 1.5                  # 1.5R primary target from the playbook
  tp2: 2.5
  tp3: 4.0
  ny_session_only: false    # crypto is 24/7; set true to restrict to NY hours
