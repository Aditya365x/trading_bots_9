# ICT Session Zones — killzone high/low sweeps
name: ict_session_zones
strategy: ict_session_zones
symbols: [HYPEUSDT]    # unique coin -> no position clash on shared account
timeframe: 5m
market: futures

leverage: 1
risk_per_trade_pct: 1.0
max_position_usdt: 400          # cap per-bot notional so all 9 fit the shared 5000 USDT wallet
use_break_even: true
tp_split: [0.34, 0.33, 0.33]

lookback_bars: 600
poll_seconds: 5
dry_run: false

params:
  timezone: "GMT+0"          # candles are UTC; offset interprets session times
  min_sweep_atr: 0.1
  sweep_cooldown: 3
  body_filter: true
  sl_mult: 1.5
  tp1: 1.0
  tp2: 2.0
  tp3: 3.0
  # sessions (name, "HHMM-HHMM" in the timezone above):
  sessions:
    - ["Asia", "2000-0000"]
    - ["London", "0200-0500"]
    - ["NY AM", "0930-1100"]
    - ["NY Lunch", "1200-1300"]
    - ["NY PM", "1330-1600"]
