# Precision Sniper — EMA ribbon + confluence score
name: precision_sniper
strategy: precision_sniper
symbols: [BTCUSDT]    # unique coin -> no position clash on shared account
timeframe: 5m
market: futures

leverage: 1
risk_per_trade_pct: 1.0
max_position_usdt: 0          # 0 = size purely from risk %
use_break_even: true
tp_split: [0.34, 0.33, 0.33]

lookback_bars: 600
poll_seconds: 5
dry_run: false

params:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 55
  rsi_len: 13
  atr_len: 14
  min_score: 5
  sl_mult: 1.5
  tp1: 1.0
  tp2: 2.0
  tp3: 3.0
  swing_lookback: 10
  grade_filter: "All"        # All | "A+ and A" | "A+ Only"
  hide_c_grade: true
  high_vol_thresh: 1.3
  skip_high_vol: true
