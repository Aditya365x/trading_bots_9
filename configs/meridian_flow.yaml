# Meridian Flow — SMC BOS / CHoCH
name: meridian_flow
strategy: meridian_flow
symbols: [XRPUSDT]    # unique coin -> no position clash on shared account
timeframe: 5m
market: futures

leverage: 1
risk_per_trade_pct: 1.0
max_position_usdt: 400          # cap per-bot notional so all 9 fit the shared 5000 USDT wallet
use_break_even: true
tp_split: [0.34, 0.33, 0.33]

lookback_bars: 600
poll_seconds: 5
dry_run: false

params:
  swing_len: 13
  break_src: "Close"          # Close | Wick
  signal_mode: "BOS + CHoCH"  # BOS + CHoCH | CHoCH only | BOS only
  use_htf: false
  htf_tf: "1h"
  htf_ema_len: 50
  atr_len_risk: 13
  risk_preset: "Balanced"
