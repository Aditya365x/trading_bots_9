# Adaptive Fibonacci Trailing — structure -> Fib 0.5 cross
name: adaptive_fib_trailing
strategy: adaptive_fib_trailing
symbols: [DOGEUSDT]    # unique coin -> no position clash on shared account
timeframe: 5m
market: futures

leverage: 1
risk_per_trade_pct: 1.0
max_position_usdt: 0
use_break_even: true
tp_split: [0.34, 0.33, 0.33]

lookback_bars: 600
poll_seconds: 5
dry_run: false

params:
  pivot_len: 13
  cross_strictness: "Strict"   # Strict | Relaxed | None
  confirm_filter: 0.2
  body_filter: 0.5
  adx_trend: 22.0
  volatility_mult: 1.6
  use_confidence: true
  min_confidence: 50.0
  risk_preset: "Balanced"
