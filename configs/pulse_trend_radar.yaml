# Pulse Trend Radar — KAMA + median-ATR bands, trend-flip
name: pulse_trend_radar
strategy: pulse_trend_radar
symbols: [ETHUSDT]    # unique coin -> no position clash on shared account
timeframe: 15m          # primary trading TF
market: futures

leverage: 10
risk_per_trade_pct: 1.0
risk_usdt: 2          # absolute max risk per trade in USD (overrides the % above)
max_position_usdt: 100          # $10 margin x 10x leverage = $100 notional
use_break_even: true
tp_split: [0.34, 0.33, 0.33]

lookback_bars: 600
poll_seconds: 5
dry_run: false

params:
  er_length: 13
  fast_alpha: 2
  slow_alpha: 30
  band_mult: 1.8
  atr_length: 50
  sl_mult: 3.0
  tp1: 1.0
  tp2: 2.0
  tp3: 3.0
